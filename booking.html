<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUXE TRAIL | Booking</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>


<body>


<header class="dark-header">

<nav>

<div class="logo">
LUXE <span>TRAIL</span>
</div>


<ul>

<li><a href="index.html">Home</a></li>
<li><a href="hotels.html">Hotels</a></li>
<li><a href="apartments.html">Apartments</a></li>

</ul>


</nav>

</header>



<section class="booking-section">


<div class="booking-box">


<h1>
Complete Your Reservation
</h1>


<form>


<label>
Full Name
</label>

<input type="text" placeholder="Your Name">



<label>
Email Address
</label>

<input type="email" placeholder="Email">



<label>
Choose Stay
</label>


<select>

<option>
Luxury Palace Hotel
</option>

<option>
Royal Apartment
</option>

<option>
Ocean View Resort
</option>

</select>



<div class="dates">


<div>

<label>
Check In
</label>

<input type="date">

</div>



<div>

<label>
Check Out
</label>

<input type="date">

</div>


</div>



<label>
Guests
</label>

<select>

<option>
1 Guest
</option>

<option>
2 Guests
</option>

<option>
Family
</option>

</select>



<label>
Special Requests
</label>

<textarea placeholder="Write your request"></textarea>



<h2>
Total: $250
</h2>



<button class="confirm-btn">

Confirm Booking

</button>


</form>


</div>


</section>



<script src="script.js"></script>

</body>

</html>
